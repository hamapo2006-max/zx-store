<form id="appForm" enctype="multipart/form-data">
    <div class="form-grid">
        <div class="form-group">
            <label>اسم التطبيق</label>
            <input type="text" id="appName" required>
        </div>
        <div class="form-group">
            <label>التصنيف</label>
            <select id="appCategory" required>
                <option>أدوات</option>
                <option>وسائط</option>
                <option>ألعاب</option>
            </select>
        </div>
        <div class="form-group">
            <label>الإصدار</label>
            <input type="text" id="appVersion" required>
        </div>
        <div class="form-group">
            <label>أيقونة</label>
            <input type="text" id="appIcon" value="📱">
        </div>
    </div>
    
    <div class="form-group">
        <label>الوصف</label>
        <textarea id="appDesc" rows="3" required></textarea>
    </div>
    
    <div class="form-group">
        <label>ملف IPA</label>
        <div class="file-upload" onclick="document.getElementById('ipaFile').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>اضغط لاختيار ملف IPA</p>
            <input type="file" id="ipaFile" accept=".ipa" required style="display: none;">
        </div>
    </div>
    
    <button type="submit" class="btn-primary">🚀 رفع التطبيق</button>
</form>
